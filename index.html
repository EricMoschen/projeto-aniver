<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinha de Aniversário ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-hearts" id="bgHearts" aria-hidden="true"></div>

  <main class="scene">
    <header class="title-wrap">
      <p class="subtitle">Para celebrar o seu dia ✨</p>
      <h1>Uma cartinha feita com amor</h1>
    </header>

    <section class="envelope-wrapper" aria-label="Envelope com carta animada">
      <div class="envelope" id="envelope">
        <div class="flap" aria-hidden="true"></div>
        <button class="seal" id="openBtn" aria-label="Abrir cartinha"></button>

        <div class="letter" id="letter">
          <div class="paper-lines" aria-hidden="true"></div>
          <div class="writer" id="writer" aria-hidden="true">
            <span class="pen"></span>
          </div>

          <article class="message" id="message"></article>
        </div>
      </div>
    </section>

    <p class="hint" id="hint">Clique no selo para abrir 💌</p>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
